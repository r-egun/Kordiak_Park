---
layout: default
title: Bird Map
---
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<h1 class="text-3xl font-bold text-stone-900 mb-2">Bird Sightings Map</h1>
<p class="text-stone-600 mb-6">See where wildlife has been spotted around Kordiak Park.</p>

<div id="map" class="h-[500px] w-full rounded-xl shadow-inner border border-stone-300 z-0"></div>

<script>
    // Data injected by Jekyll
    const birdSightings = [
      {% for bird in site.data.birds %}
      {
        species: "{{ bird.species }}",
        lat: {{ bird.lat }},
        lng: {{ bird.lng }},
        note: "{{ bird.note }}",
        date: "{{ bird.date }}"
      },
      {% endfor %}
    ];

    // Initialize map
    // Centering on the requested coordinates
    const map = L.map('map').setView([45.058486, -93.233195], 15);

    // Add OpenStreetMap tiles
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // Add markers
    birdSightings.forEach(bird => {
        L.marker([bird.lat, bird.lng])
            .addTo(map)
            .bindPopup(`
                <div class="text-sm">
                    <strong class="text-lg">${bird.species}</strong><br>
                    <span class="text-stone-500">${bird.date}</span><br>
                    <p class="mt-1">${bird.note}</p>
                </div>
            `);
    });
</script>
