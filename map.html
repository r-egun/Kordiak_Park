---
layout: default
title: Bird Map
permalink: /map/
---
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<h1 class="text-3xl font-bold text-stone-900 mb-2">Bird Sightings Map</h1>
<p class="text-stone-600 mb-6">See where wildlife has been spotted around Kordiak Park.</p>

<div id="map" class="h-[500px] w-full rounded-xl shadow-inner border border-stone-300 z-0"></div>


<script>
    const birdSightings = [
      {% for bird in site.data.birds %}
      {
        species: "{{ bird.species }}",
        lat: {{ bird.lat }},
        lng: {{ bird.lng }},
        note: "{{ bird.note }}",
        date: "{{ bird.date }}",
        image: "{{ bird.image }}"
      },
      {% endfor %}
    ];

    const map = L.map('map').setView([45.058486, -93.233195], 16);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // Create a simple lightbox overlay
    const lightbox = document.createElement('div');
    lightbox.style.cssText = `
        position: fixed;
        z-index: 9999;
        display: none;
        background: rgba(0,0,0,0.85);
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        justify-content: center;
        align-items: center;
        cursor: zoom-out;
    `;
    document.body.appendChild(lightbox);

    const lightboxImg = document.createElement('img');
    lightboxImg.style.cssText = `
        max-width: 90%;
        max-height: 90%;
        border-radius: 8px;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
        cursor: zoom-out;
    `;
    lightbox.appendChild(lightboxImg);

    lightbox.onclick = () => {
        lightbox.style.display = 'none';
    };

    lightboxImg.onclick = (e) => {
        e.stopPropagation();
        lightbox.style.display = 'none';
    };

    birdSightings.forEach(bird => {
        let popupContent = `
            <div class="text-sm">
                <strong class="text-lg">${bird.species}</strong><br>
                <span class="text-stone-500">${bird.date}</span><br>
                ${bird.image ? `<img src="${bird.image}" class="w-full h-24 object-cover rounded mt-2 mb-1 cursor-zoom-in" onclick="openLightbox('${bird.image}')" />` : ''}
                <p class="mt-1">${bird.note}</p>
            </div>
        `;
        L.marker([bird.lat, bird.lng])
            .addTo(map)
            .bindPopup(popupContent);
    });

    window.openLightbox = function(src) {
        lightboxImg.src = src;
        lightbox.style.display = 'flex';
    };
</script>
