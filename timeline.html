---
layout: default
title: Timeline
permalink: /timeline/
---
<h1 class="text-3xl font-bold text-stone-900 mb-8">Park Timeline</h1>

<div class="relative border-l-2 border-stone-200 ml-4 md:mx-auto md:w-0.5 h-full py-8">
  {% for event in site.data.timeline %}
  <div class="mb-8 md:relative">
    <div class="flex items-center w-full md:justify-between">
      <div class="absolute w-4 h-4 bg-green-600 rounded-full border-4 border-white shadow-sm -left-[9px] md:left-1/2 md:ml-[-8px] md:translate-x-0"></div>
      <div class="w-full md:w-5/12 {% if forloop.even %}md:order-last md:text-left {% else %}md:order-first md:text-right {% endif %}">
        <time class="text-sm font-semibold text-green-700">{{ event.date }}</time>
        <h3 class="text-lg font-bold text-stone-800">{{ event.event }}</h3>
        <p class="text-stone-600 text-sm">{{ event.description }}</p>
      </div>
    </div>
  </div}
  {% endfor %}
</div>

    </div>
  </div>
  {% endfor %}
</div>
