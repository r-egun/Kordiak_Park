---
layout: default
title: Timeline
permalink: /timeline/
---
<h1 class="text-3xl font-bold text-stone-900 mb-8">Park Timeline</h1>

<div class="relative mx-auto max-w-4xl">
  <!-- The central line -->
  <div class="absolute left-4 md:left-1/2 transform md:-translate-x-1/2 h-full w-1 bg-stone-200"></div>

  {% for event in site.data.timeline %}
  <div class="mb-8 md:mb-20 relative">
    <!-- The Dot -->
    <div class="absolute left-4 md:left-1/2 transform -translate-x-1/2 w-4 h-4 bg-green-600 rounded-full border-4 border-white shadow-sm z-10"></div>
    
    <!-- Content Container -->
    <div class="ml-10 md:ml-0 md:w-1/2 {% if forloop.even %}md:ml-auto md:pl-12 {% else %}md:text-right md:pr-12 {% endif %}">
      <div class="bg-white p-6 rounded-xl shadow-sm border border-stone-200">
        <time class="text-sm font-bold text-green-700 uppercase tracking-wider">{{ event.date }}</time>
        <h3 class="text-xl font-bold text-stone-800 mt-1">{{ event.event }}</h3>
        <div class="prose prose-stone text-stone-600 mt-2">
          {{ event.description }}
        </div>
      </div>
    </div>
  </div>
  {% endfor %}
</div>
