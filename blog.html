---
layout: default
title: Blog
permalink: /blog/
---
<h1 class="text-3xl font-bold text-stone-900 mb-8">Latest from the Park</h1>

<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
  {% for post in site.posts %}
  <article class="bg-white rounded-xl shadow-sm overflow-hidden border border-stone-200 hover:shadow-md transition-shadow">
    <div class="p-6">
      <span class="text-sm text-stone-500 font-medium uppercase tracking-wide">{{ post.date | date: "%b %d, %Y" }}</span>
      <h2 class="text-2xl font-bold text-green-800 mt-2 mb-3">
        <a href="{{ site.baseurl }}{{ post.url }}" class="hover:underline">{{ post.title }}</a>
      </h2>
      <div class="prose prose-stone prose-sm mb-4">
        {{ post.excerpt | strip_html }}
      </div>
      <div class="flex items-center justify-between mt-4 pt-4 border-t border-stone-100">
        <a href="{{ site.baseurl }}{{ post.url }}" class="text-green-700 font-semibold hover:text-green-600 inline-flex items-center text-sm">
          Read more
          <i data-lucide="arrow-right" class="w-4 h-4 ml-1"></i>
        </a>
        <div class="flex gap-2">
            <a href="#" class="text-stone-400 hover:text-blue-600 transition-colors"><i data-lucide="facebook" class="w-4 h-4"></i></a>
            <a href="#" class="text-stone-400 hover:text-sky-400 transition-colors"><i data-lucide="twitter" class="w-4 h-4"></i></a>
        </div>
      </div>
    </div>
  </article>
  {% endfor %}
</div>
