---
layout: default
---
{% if page.image %}
<img src="{{ page.image }}" alt="{{ page.title }}" class="w-full h-96 object-cover rounded-xl mb-8 shadow-lg">
{% endif %}

<header class="mb-8">
    <h1 class="text-4xl font-bold text-stone-900 mb-4">{{ page.title }}</h1>
    <div class="flex items-center text-stone-500 gap-4">
        <span class="flex items-center gap-1"><i data-lucide="calendar" class="w-4 h-4"></i> {{ page.date | date: "%B %d, %Y" }}</span>
        <span class="flex items-center gap-1"><i data-lucide="user" class="w-4 h-4"></i> Park Ranger</span>
    </div>
</header>

<div class="prose prose-stone prose-lg max-w-none">
    {{ content }}
</div>

<hr class="my-12 border-stone-200">

<div class="flex items-center justify-between bg-stone-100 p-6 rounded-xl">
    <span class="font-bold text-stone-700">Share this story:</span>
    <div class="flex gap-4">
        <a href="#" class="p-2 bg-white rounded-full shadow-sm hover:text-blue-600 transition-colors"><i data-lucide="facebook" class="w-5 h-5"></i></a>
        <a href="#" class="p-2 bg-white rounded-full shadow-sm hover:text-sky-400 transition-colors"><i data-lucide="twitter" class="w-5 h-5"></i></a>
        <a href="#" class="p-2 bg-white rounded-full shadow-sm hover:text-green-600 transition-colors"><i data-lucide="mail" class="w-5 h-5"></i></a>
    </div>
</div>
