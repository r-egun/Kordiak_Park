<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | {{ site.title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Lora', serif; }
        .nav-link { @apply hover:text-green-700 transition-colors; }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 flex flex-col min-h-screen">

    <header class="bg-white shadow-sm sticky top-0 z-50">
        <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="{{ site.baseurl }}/" class="text-2xl font-bold text-green-800">{{ site.title }}</a>
            <ul class="flex space-x-6 font-medium">
                <li><a href="{{ site.baseurl }}/" class="nav-link text-stone-600">Home</a></li>
                <li><a href="{{ site.baseurl }}/blog" class="nav-link text-stone-600">Blog</a></li>
                <li><a href="{{ site.baseurl }}/timeline" class="nav-link text-stone-600">Timeline</a></li>
                <li><a href="{{ site.baseurl }}/map" class="nav-link text-stone-600">Map</a></li>
            </ul>
        </nav>
    </header>

    <main class="flex-grow container mx-auto px-6 py-8">
        {{ content }}
    </main>

    <footer class="bg-stone-800 text-stone-300 py-8 mt-12">
        <div class="container mx-auto px-6 text-center">
            <p class="text-sm">&copy; {{ "now" | date: "%Y" }} {{ site.title }} - Kordiak Park Explorer</p>
            <p class="text-xs mt-2 text-stone-500">Columbia Heights, Minnesota</p>
        </div>
    </footer>

</body>
</html>
